<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bay Area GOES-18 (COD Tahoe sector)</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
               font-family: -apple-system, sans-serif; }
  #stage { position: absolute; }
  #stage img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #status { position: absolute; bottom: 6px; right: 10px; color: #9acd32;
            font-size: 12px; text-shadow: 0 0 3px #000; }
  #product { position: absolute; top: 8px; left: 10px; color: #fff;
             font-size: 14px; background: rgba(0,0,0,0.55); padding: 4px 10px;
             border-radius: 6px; opacity: 0; transition: opacity 0.4s; }
  #err { color: #f66; padding: 16px; font-size: 14px; display: none;
         position: absolute; top: 0; left: 0; }
</style>
</head>
<body>
<div id="stage">
  <img id="sat" alt="">
  <img id="map" alt="">
</div>
<div id="product"></div>
<div id="status"></div>
<div id="err">No frames found for this product. COD may be down.</div>
<script>
// ---- Settings ----

// Tap the image to cycle through these. Confirmed COD product codes:
// 01-16 (ABI bands), truecolor, airmass, natcolor, natcolorfire,
// ntmicro, dcphase, simplewv, sandwich. Add more entries to taste,
// e.g. { code: "ntmicro", label: "Nighttime Microphysics (fog)" }.
// Note: truecolor blends to IR at night on its own.
const PRODUCTS = [
  { code: "02",        label: "Band 2 Visible (0.5 km)" },
  { code: "truecolor", label: "True Color / IR at night (1 km)" }
];

const SECTOR_BASE = "https://weather.cod.edu/wxdata/satellite/local/Tahoe/";
const MAP_URL = SECTOR_BASE + "maps/Tahoe_map.png";

// Frames arrive every 5 minutes at UTC minutes ending in 1 or 6. The
// seconds in the filename have drifted over time (17, 19, 24, 25 have
// all appeared), so history probing tries each per time slot. The
// newest frame always comes from the current/ endpoint, no timestamp.
const SECONDS_LIST = ["17", "19", "24", "25"];

// Focus point as fractions of the 1600x900 frame (0 = left/top).
const FOCUS_X = 0.25;
const FOCUS_Y = 0.60;

// Zoom. 1 = frame just covers the window. Higher pushes in on the Bay.
const ZOOM = 2;

// Animation settings.
const FRAME_COUNT = 7;       // total frames in the loop, including latest
const FRAME_MS = 350;        // per frame
const LAST_FRAME_MS = 1500;  // hold on newest frame
const RECHECK_MIN = 5;       // look for new frames this often

// ---- No changes needed below ----

const sat = document.getElementById("sat");
const stage = document.getElementById("stage");
const statusEl = document.getElementById("status");
const productEl = document.getElementById("product");
const errEl = document.getElementById("err");
document.getElementById("map").src = MAP_URL;

let productIndex = 0;
let frames = [];
let animTimer = null;
let labelTimer = null;
let loadToken = 0;

const pad = n => String(n).padStart(2, "0");

// Pick starting product: URL ?p=code wins, then last saved choice.
(function initProduct() {
  const fromUrl = new URLSearchParams(location.search).get("p");
  let saved = null;
  try { saved = localStorage.getItem("product"); } catch (e) {}
  const want = fromUrl || saved;
  const i = PRODUCTS.findIndex(p => p.code === want);
  if (i >= 0) productIndex = i;
})();

// Stable latest-frame endpoint, confirmed in COD's own page source.
function urlCurrent(code) {
  return SECTOR_BASE + "current/Tahoe." + code + ".jpg?t=" + Date.now();
}

function urlHistoric(code, d, secs) {
  return SECTOR_BASE + code + "/Tahoe." + code + "." +
    d.getUTCFullYear() + pad(d.getUTCMonth() + 1) + pad(d.getUTCDate()) +
    "." + pad(d.getUTCHours()) + pad(d.getUTCMinutes()) + secs + ".jpg";
}

// Recent expected frame times, newest first: minutes ending in 1 or 6.
function candidateTimes(count) {
  let t = new Date(Date.now() - 4 * 60 * 1000);  // processing buffer
  const rem = ((t.getUTCMinutes() - 1) % 5 + 5) % 5;
  t = new Date(t.getTime() - rem * 60 * 1000);
  t.setUTCSeconds(0, 0);
  const out = [];
  for (let i = 0; i < count; i++) {
    out.push(new Date(t.getTime() - i * 5 * 60 * 1000));
  }
  return out;
}

function probe(url) {
  return new Promise(resolve => {
    const im = new Image();
    im.onload = () => resolve(true);
    im.onerror = () => resolve(false);
    im.src = url;
  });
}

async function loadFrames() {
  const token = ++loadToken;
  const code = PRODUCTS[productIndex].code;
  showProductLabel(PRODUCTS[productIndex].label);

  const found = [];

  // Historical frames for the animation, seconds-drift tolerant.
  const times = candidateTimes(FRAME_COUNT + 6);
  for (const t of times) {
    if (found.length >= FRAME_COUNT - 1) break;
    for (const secs of SECONDS_LIST) {
      const url = urlHistoric(code, t, secs);
      if (await probe(url)) {
        found.push({
          url: url,
          label: pad(t.getUTCHours()) + ":" + pad(t.getUTCMinutes()) + "Z"
        });
        break;
      }
      if (token !== loadToken) return;
    }
    if (token !== loadToken) return;
  }

  found.reverse();  // oldest first

  // Newest frame from the stable current/ endpoint, appended last.
  const cur = urlCurrent(code);
  if (await probe(cur)) {
    found.push({ url: cur, label: "latest" });
  }
  if (token !== loadToken) return;

  if (found.length === 0) {
    errEl.style.display = "block";
    return;
  }
  errEl.style.display = "none";
  frames = found;
  startAnimation();
}

function startAnimation() {
  if (animTimer) clearTimeout(animTimer);
  let i = 0;
  function step() {
    const f = frames[i];
    sat.src = f.url;
    statusEl.textContent = f.label;
    const dwell = (i === frames.length - 1) ? LAST_FRAME_MS : FRAME_MS;
    i = (i + 1) % frames.length;
    animTimer = setTimeout(step, dwell);
  }
  step();
}

function showProductLabel(text) {
  productEl.textContent = text;
  productEl.style.opacity = "1";
  if (labelTimer) clearTimeout(labelTimer);
  labelTimer = setTimeout(() => { productEl.style.opacity = "0"; }, 2500);
}

function switchProduct() {
  productIndex = (productIndex + 1) % PRODUCTS.length;
  try { localStorage.setItem("product", PRODUCTS[productIndex].code); } catch (e) {}
  if (animTimer) clearTimeout(animTimer);
  frames = [];
  loadFrames();
}

document.body.addEventListener("click", switchProduct);

function layout() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const iw = 1600, ih = 900;  // COD localized sector frame size
  const scale = Math.max(vw / iw, vh / ih) * ZOOM;
  const w = iw * scale;
  const h = ih * scale;
  let x = vw / 2 - FOCUS_X * w;
  let y = vh / 2 - FOCUS_Y * h;
  x = Math.min(0, Math.max(vw - w, x));
  y = Math.min(0, Math.max(vh - h, y));
  stage.style.width = w + "px";
  stage.style.height = h + "px";
  stage.style.left = x + "px";
  stage.style.top = y + "px";
}

window.addEventListener("resize", layout);
layout();
loadFrames();
setInterval(loadFrames, RECHECK_MIN * 60 * 1000);
</script>
</body>
</html>
