<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bay Area GOES-18 + KMUX Radar</title>
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
               font-family: -apple-system, sans-serif; }
  #stage { position: absolute; }
  #stage img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #radarWrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
               display: none; }
  #radarMap { width: 100%; height: 100%; background: #000; }
  .radarTiles { image-rendering: pixelated; }
  #status { position: absolute; bottom: 6px; right: 10px; color: #9acd32;
            font-size: 12px; text-shadow: 0 0 3px #000; z-index: 1000; }
  #product { position: absolute; top: 8px; left: 10px; color: #fff;
             font-size: 14px; background: rgba(0,0,0,0.55); padding: 4px 10px;
             border-radius: 6px; opacity: 0; transition: opacity 0.4s;
             z-index: 1000; }
  #err { color: #f66; padding: 16px; font-size: 14px; display: none;
         position: absolute; top: 0; left: 0; z-index: 1000; }
</style>
</head>
<body>
<div id="stage">
  <img id="sat" alt="">
  <img id="map" alt="">
</div>
<div id="radarWrap"><div id="radarMap"></div></div>
<div id="product"></div>
<div id="status"></div>
<div id="err">No frames found for this product. COD may be down.</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ---- Settings ----

// Animation for the satellite views. false = still image of the latest
// frame, refreshing every 5 minutes. Recommended for Teapot.
const ANIMATE = false;

// Tap the image to cycle through these. Satellite entries use COD codes
// (01-16, truecolor, ntmicro, etc). The kmux entry is the radar map.
const PRODUCTS = [
  { code: "02",        label: "Band 2 Visible (0.5 km)" },
  { code: "truecolor", label: "True Color / IR at night (1 km)" },
  { code: "kmux", radar: true, label: "KMUX Radar (N0B, 0.25 km)" }
];

// -- Satellite settings --
const SECTOR_BASE = "https://weather.cod.edu/wxdata/satellite/local/Tahoe/";
const MAP_URL = SECTOR_BASE + "maps/Tahoe_map.png";
const SECONDS_LIST = ["17", "19", "24", "25"];

// Focus point as fractions of the 1600x900 frame (0 = left/top).
const FOCUS_X = 0.25;
const FOCUS_Y = 0.60;

// Zoom. 1 = frame just covers the window. Higher pushes in on the Bay.
const ZOOM = 2;

// -- Radar settings --
// Map center [latitude, longitude] and zoom level (8 = wide Bay Area,
// 9 = tighter).
const RADAR_CENTER = [37.80, -122.30];
const RADAR_ZOOM = 8;
// KMUX radar site location (Mt Umunhum), shown as a small dot.
const KMUX_LOC = [37.155, -121.898];

// Reflectivity filter: anything below this dBZ value is hidden.
// 10 removes most clear-air noise. 5 keeps more weak echo (and more
// junk). Set to -35 to disable filtering entirely.
const MIN_DBZ = 10;

// -- Shared timing --
const FRAME_COUNT = 6;       // loop length if ANIMATE is true
const FRAME_MS = 400;
const LAST_FRAME_MS = 1800;
const RECHECK_MIN = 5;       // refresh the active view this often

// ---- No changes needed below ----

const stage = document.getElementById("stage");
const sat = document.getElementById("sat");
const radarWrap = document.getElementById("radarWrap");
const statusEl = document.getElementById("status");
const productEl = document.getElementById("product");
const errEl = document.getElementById("err");
document.getElementById("map").src = MAP_URL;

let productIndex = 0;
let frames = [];
let animTimer = null;
let labelTimer = null;
let loadToken = 0;
let leafletMap = null;
let radarLayer = null;
let radarBucket = 0;

const pad = n => String(n).padStart(2, "0");

// Pick starting product: URL ?p=code wins, then last saved choice.
(function initProduct() {
  const fromUrl = new URLSearchParams(location.search).get("p");
  let saved = null;
  try { saved = localStorage.getItem("product"); } catch (e) {}
  const want = fromUrl || saved;
  const i = PRODUCTS.findIndex(p => p.code === want);
  if (i >= 0) productIndex = i;
})();

// ---- Satellite view ----

// Bucketed cache parameter: changes only every 5 minutes, so Teapot's
// rapid reloads reuse Safari's cached copy instead of re-downloading.
function urlCurrent(code) {
  return SECTOR_BASE + "current/Tahoe." + code + ".jpg?t=" +
    Math.floor(Date.now() / 300000);
}

function urlHistoric(code, d, secs) {
  return SECTOR_BASE + code + "/Tahoe." + code + "." +
    d.getUTCFullYear() + pad(d.getUTCMonth() + 1) + pad(d.getUTCDate()) +
    "." + pad(d.getUTCHours()) + pad(d.getUTCMinutes()) + secs + ".jpg";
}

function candidateTimes(count) {
  let t = new Date(Date.now() - 4 * 60 * 1000);
  const rem = ((t.getUTCMinutes() - 1) % 5 + 5) % 5;
  t = new Date(t.getTime() - rem * 60 * 1000);
  t.setUTCSeconds(0, 0);
  const out = [];
  for (let i = 0; i < count; i++) {
    out.push(new Date(t.getTime() - i * 5 * 60 * 1000));
  }
  return out;
}

function probe(url) {
  return new Promise(resolve => {
    const im = new Image();
    im.onload = () => resolve(true);
    im.onerror = () => resolve(false);
    im.src = url;
  });
}

async function loadFrames() {
  const token = ++loadToken;
  const code = PRODUCTS[productIndex].code;

  const cur = urlCurrent(code);
  const ok = await probe(cur);
  if (token !== loadToken) return;
  if (!ok) {
    errEl.style.display = "block";
    return;
  }
  errEl.style.display = "none";
  frames = [{ url: cur, label: "latest" }];
  sat.src = cur;
  statusEl.textContent = "latest";

  if (!ANIMATE) return;

  const history = [];
  const times = candidateTimes(FRAME_COUNT + 5);
  for (const t of times) {
    if (history.length >= FRAME_COUNT - 1) break;
    for (const secs of SECONDS_LIST) {
      const url = urlHistoric(code, t, secs);
      if (await probe(url)) {
        history.push({
          url: url,
          label: pad(t.getUTCHours()) + ":" + pad(t.getUTCMinutes()) + "Z"
        });
        break;
      }
      if (token !== loadToken) return;
    }
    if (token !== loadToken) return;
  }
  if (token !== loadToken) return;

  history.reverse();
  frames = history.concat(frames);
  startAnimation();
}

function startAnimation() {
  if (animTimer) clearTimeout(animTimer);
  if (frames.length < 2) return;
  let i = 0;
  function step() {
    const f = frames[i];
    sat.src = f.url;
    statusEl.textContent = f.label;
    const dwell = (i === frames.length - 1) ? LAST_FRAME_MS : FRAME_MS;
    i = (i + 1) % frames.length;
    animTimer = setTimeout(step, dwell);
  }
  step();
}

function layout() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const iw = 1600, ih = 900;
  const scale = Math.max(vw / iw, vh / ih) * ZOOM;
  const w = iw * scale;
  const h = ih * scale;
  let x = vw / 2 - FOCUS_X * w;
  let y = vh / 2 - FOCUS_Y * h;
  x = Math.min(0, Math.max(vw - w, x));
  y = Math.min(0, Math.max(vh - h, y));
  stage.style.width = w + "px";
  stage.style.height = h + "px";
  stage.style.left = x + "px";
  stage.style.top = y + "px";
}

// ---- Radar view ----

// IEM's official n0q color ramp (from pyIEM), mapping dBZ to RGB.
// Used to translate tile pixel colors back into data values so the
// MIN_DBZ filter operates on real reflectivity, not guessed colors.
const RAMP = [[-32.0,133,113,143],[-31.5,133,114,143],[-31.0,134,115,141],[-30.5,135,117,139],[-30.0,135,118,139],[-29.5,136,119,137],[-29.0,137,121,135],[-28.5,137,122,135],[-28.0,138,123,133],[-27.5,139,125,132],[-27.0,139,126,132],[-26.5,140,127,130],[-26.0,141,129,128],[-25.5,141,130,128],[-25.0,142,131,126],[-24.5,143,132,124],[-24.0,143,133,124],[-23.5,144,135,123],[-23.0,145,136,121],[-22.5,145,137,121],[-22.0,146,139,119],[-21.5,147,141,117],[-21.0,150,145,83],[-20.5,152,148,87],[-20.0,155,151,91],[-19.5,157,154,96],[-19.0,160,157,100],[-18.5,163,160,104],[-18.0,165,163,109],[-17.5,168,166,113],[-17.0,170,169,118],[-16.5,173,172,122],[-16.0,176,175,126],[-15.5,178,178,131],[-15.0,183,184,140],[-14.5,186,187,144],[-14.0,189,190,148],[-13.5,191,193,153],[-13.0,194,196,157],[-12.5,196,199,162],[-12.0,199,202,166],[-11.5,202,205,170],[-11.0,204,208,175],[-10.5,210,212,180],[-10.0,207,210,180],[-9.5,201,204,180],[-9.0,198,201,180],[-8.5,195,199,180],[-8.0,192,196,180],[-7.5,189,193,180],[-7.0,185,190,180],[-6.5,182,187,180],[-6.0,179,185,180],[-5.5,176,182,180],[-5.0,173,179,180],[-4.5,170,176,180],[-4.0,164,171,180],[-3.5,160,168,180],[-3.0,157,165,180],[-2.5,154,162,180],[-2.0,151,160,180],[-1.5,148,157,180],[-1.0,145,154,180],[-0.5,148,155,181],[0.0,144,152,180],[0.5,140,149,179],[1.0,136,146,178],[1.5,128,140,176],[2.0,124,137,175],[2.5,120,134,174],[3.0,116,131,172],[3.5,112,128,171],[4.0,108,125,170],[4.5,103,121,169],[5.0,99,118,168],[5.5,95,115,167],[6.0,91,112,166],[6.5,87,109,164],[7.0,79,103,162],[7.5,75,100,161],[8.0,71,97,160],[8.5,67,94,159],[9.0,65,91,158],[9.5,67,97,162],[10.0,69,104,166],[10.5,72,111,170],[11.0,74,118,174],[11.5,77,125,178],[12.0,79,132,182],[12.5,81,139,187],[13.0,86,153,195],[13.5,89,159,199],[14.0,91,166,203],[14.5,94,173,207],[15.0,96,180,212],[15.5,98,187,216],[16.0,101,194,220],[16.5,103,201,224],[17.0,106,208,228],[17.5,111,214,232],[18.0,104,214,215],[18.5,89,214,179],[19.0,82,214,162],[19.5,75,214,144],[20.0,67,214,126],[20.5,60,214,109],[21.0,53,214,91],[21.5,17,213,24],[22.0,17,209,23],[22.5,16,205,23],[23.0,16,200,22],[23.5,16,196,22],[24.0,15,188,21],[24.5,15,183,20],[25.0,14,179,20],[25.5,14,175,19],[26.0,14,171,19],[26.5,13,166,18],[27.0,13,162,18],[27.5,13,158,17],[28.0,12,153,17],[28.5,12,149,16],[29.0,12,145,16],[29.5,11,136,15],[30.0,11,132,14],[30.5,10,128,14],[31.0,10,124,13],[31.5,10,119,13],[32.0,9,115,12],[32.5,9,111,12],[33.0,9,107,11],[33.5,8,102,11],[34.0,8,98,10],[34.5,9,94,9],[35.0,50,115,8],[35.5,70,125,8],[36.0,91,136,7],[36.5,111,146,7],[37.0,132,157,6],[37.5,152,168,6],[38.0,173,178,5],[38.5,193,189,5],[39.0,214,199,4],[39.5,234,210,4],[40.0,255,226,0],[40.5,255,216,0],[41.0,255,211,0],[41.5,255,206,0],[42.0,255,201,0],[42.5,255,196,0],[43.0,255,192,0],[43.5,255,187,0],[44.0,255,182,0],[44.5,255,177,0],[45.0,255,172,0],[45.5,255,167,0],[46.0,255,162,0],[46.5,255,153,0],[47.0,255,148,0],[47.5,255,143,0],[48.0,255,138,0],[48.5,255,133,0],[49.0,255,128,0],[49.5,255,0,0],[50.0,248,0,0],[50.5,241,0,0],[51.0,234,0,0],[51.5,227,0,0],[52.0,213,0,0],[52.5,205,0,0],[53.0,198,0,0],[53.5,191,0,0],[54.0,184,0,0],[54.5,177,0,0],[55.0,170,0,0],[55.5,163,0,0],[56.0,155,0,0],[56.5,148,0,0],[57.0,141,0,0],[57.5,127,0,0],[58.0,120,0,0],[58.5,113,0,0],[59.0,255,255,255],[59.5,255,245,255],[60.0,255,234,255],[60.5,255,223,255],[61.0,255,212,255],[61.5,255,201,255],[62.0,255,190,255],[62.5,255,179,255],[63.0,255,157,255],[63.5,255,146,255],[64.0,255,117,255],[64.5,252,107,253],[65.0,249,96,250],[65.5,246,86,247],[66.0,243,75,244],[66.5,240,64,241],[67.0,237,54,239],[67.5,234,43,236],[68.0,231,32,233],[68.5,225,11,227],[69.0,178,0,255],[69.5,172,0,252],[70.0,164,0,247],[70.5,155,0,244],[71.0,147,0,239],[71.5,136,0,234],[72.0,131,0,232],[72.5,121,0,226],[73.0,114,0,221],[73.5,105,0,219],[74.0,5,236,240],[74.5,5,235,240],[75.0,5,234,240],[75.5,5,221,224],[76.0,5,220,224],[76.5,5,219,224],[77.0,5,205,208],[77.5,5,204,208],[78.0,4,189,192],[78.5,4,188,192],[79.0,4,187,192],[79.5,4,174,176],[80.0,4,173,176],[80.5,4,158,160],[81.0,4,157,160],[81.5,4,156,160],[82.0,3,142,144],[82.5,3,141,144],[83.0,3,140,144],[83.5,3,126,128],[84.0,3,125,128],[84.5,3,111,112],[85.0,3,110,112],[85.5,3,109,112],[86.0,2,95,96],[86.5,2,94,96],[87.0,2,79,80],[87.5,2,78,80],[88.0,2,77,80],[88.5,2,63,64],[89.0,2,62,64],[89.5,2,61,64],[90.0,1,48,48],[90.5,1,47,48],[91.0,1,32,32],[91.5,1,31,32],[92.0,1,30,32],[92.5,58,103,181],[93.0,58,102,181],[93.5,58,101,181],[94.0,58,100,181],[94.5,58,99,181],[95.0,58,98,181]];

const COLOR_TO_DBZ = new Map();
for (const [v, r, g, b] of RAMP) {
  COLOR_TO_DBZ.set((r << 16) | (g << 8) | b, v);
}

function filterPixels(data) {
  for (let i = 0; i < data.length; i += 4) {
    if (data[i + 3] === 0) continue;  // already transparent
    const key = (data[i] << 16) | (data[i + 1] << 8) | data[i + 2];
    const dbz = COLOR_TO_DBZ.get(key);
    // Unknown colors (antialiased edges) are kept, never invented away.
    if (dbz !== undefined && dbz < MIN_DBZ) data[i + 3] = 0;
  }
}

function radarTileUrl(coords) {
  return "https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/" +
    "ridge::MUX-N0B-0/" + coords.z + "/" + coords.x + "/" + coords.y +
    ".png?_=" + radarBucket;
}

// Canvas tile layer: downloads each radar tile, erases pixels below
// MIN_DBZ, then displays it. If IEM's server refuses cross-origin
// pixel access, tiles fall back to unfiltered display.
const FilteredRadar = L.GridLayer.extend({
  createTile: function (coords, done) {
    const tile = document.createElement("canvas");
    const size = this.getTileSize();
    tile.width = size.x;
    tile.height = size.y;
    tile.style.imageRendering = "pixelated";
    const ctx = tile.getContext("2d");
    const url = radarTileUrl(coords);

    const drawFiltered = (img) => {
      ctx.drawImage(img, 0, 0);
      try {
        const d = ctx.getImageData(0, 0, tile.width, tile.height);
        filterPixels(d.data);
        ctx.clearRect(0, 0, tile.width, tile.height);
        ctx.putImageData(d, 0, 0);
      } catch (e) { /* pixel access blocked: show unfiltered */ }
      done(null, tile);
    };

    const corsImg = new Image();
    corsImg.crossOrigin = "anonymous";
    corsImg.onload = () => drawFiltered(corsImg);
    corsImg.onerror = () => {
      // Retry without CORS so at least the raw tile displays.
      const plainImg = new Image();
      plainImg.onload = () => { ctx.drawImage(plainImg, 0, 0); done(null, tile); };
      plainImg.onerror = () => done(null, tile);
      plainImg.src = url;
    };
    corsImg.src = url;
    return tile;
  }
});

function ensureRadarMap() {
  if (leafletMap) {
    leafletMap.invalidateSize();
    return;
  }
  leafletMap = L.map("radarMap", {
    zoomControl: false, dragging: false, touchZoom: false,
    scrollWheelZoom: false, doubleClickZoom: false, boxZoom: false,
    keyboard: false, tapHold: false
  }).setView(RADAR_CENTER, RADAR_ZOOM);

  // Base map without labels.
  L.tileLayer(
    "https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",
    { subdomains: "abcd", maxZoom: 12,
      attribution: "&copy; OSM &copy; CARTO | radar: IEM" }
  ).addTo(leafletMap);

  // Labels in their own pane ABOVE the radar so geography stays visible.
  leafletMap.createPane("labels");
  leafletMap.getPane("labels").style.zIndex = 650;
  leafletMap.getPane("labels").style.pointerEvents = "none";
  L.tileLayer(
    "https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png",
    { subdomains: "abcd", maxZoom: 12, pane: "labels" }
  ).addTo(leafletMap);

  L.circleMarker(KMUX_LOC, {
    radius: 3, color: "#9acd32", fillColor: "#9acd32", fillOpacity: 1
  }).addTo(leafletMap);
}

function refreshRadar() {
  ensureRadarMap();
  radarBucket = Math.floor(Date.now() / 300000);
  if (radarLayer) leafletMap.removeLayer(radarLayer);
  radarLayer = new FilteredRadar({ className: "radarTiles" });
  radarLayer.addTo(leafletMap);
  fetchScanTime();
}

// Scan time from IEM metadata; falls back to a plain label if the
// format differs or the request is blocked.
async function fetchScanTime() {
  try {
    const r = await fetch(
      "https://mesonet.agron.iastate.edu/data/gis/images/4326/ridge/MUX/N0B_0.json"
    );
    if (!r.ok) throw new Error("bad status");
    const j = await r.json();
    const valid = j && j.meta && (j.meta.valid || j.meta.utc_valid);
    if (valid) {
      const m = String(valid).match(/T(\d{2}:\d{2})/);
      statusEl.textContent = "KMUX scan " + (m ? m[1] + "Z" : valid);
      return;
    }
    throw new Error("no time field");
  } catch (e) {
    statusEl.textContent = "KMUX N0B";
  }
}

// ---- Product switching ----

function render() {
  const p = PRODUCTS[productIndex];
  showProductLabel(p.label);
  if (animTimer) clearTimeout(animTimer);
  if (p.radar) {
    stage.style.display = "none";
    errEl.style.display = "none";
    radarWrap.style.display = "block";
    refreshRadar();
  } else {
    radarWrap.style.display = "none";
    stage.style.display = "block";
    loadFrames();
  }
}

function refreshActive() {
  const p = PRODUCTS[productIndex];
  if (p.radar) refreshRadar();
  else loadFrames();
}

function showProductLabel(text) {
  productEl.textContent = text;
  productEl.style.opacity = "1";
  if (labelTimer) clearTimeout(labelTimer);
  labelTimer = setTimeout(() => { productEl.style.opacity = "0"; }, 2500);
}

function switchProduct() {
  productIndex = (productIndex + 1) % PRODUCTS.length;
  try { localStorage.setItem("product", PRODUCTS[productIndex].code); } catch (e) {}
  render();
}

document.body.addEventListener("click", switchProduct);

window.addEventListener("resize", layout);
layout();
render();
setInterval(refreshActive, RECHECK_MIN * 60 * 1000);
</script>
</body>
</html>
